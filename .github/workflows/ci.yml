name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Linux system dependencies for Tauri (webkit, etc.)
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      # macOS: GitHub rolled every macOS image to Xcode 26.5, whose
      # clang moved compiler-rt to a directory the linker doesn't
      # search. `ort-sys`'s prebuilt ONNX Runtime then fails with
      # `ld: library 'clang_rt.osx' not found`. Runner images keep
      # earlier Xcodes installed under /Applications; select the last
      # known-good until the `ort` ecosystem catches up.
      - name: Pin Xcode (macOS)
        if: runner.os == 'macOS'
        run: |
          # List what's actually installed so a future toolchain roll
          # is diagnosable from the log.
          ls -1 /Applications | grep -i '^Xcode' || true
          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          else
            echo "No Xcode 16.x found; falling back to default." >&2
          fi
          xcodebuild -version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # Rust quality
      - name: rustfmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

      # Frontend quality
      - name: eslint
        run: pnpm lint
      - name: typecheck
        run: pnpm typecheck
      - name: unit tests
        run: pnpm test

  e2e:
    name: Playwright e2e (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: e2e
        run: pnpm test:e2e
